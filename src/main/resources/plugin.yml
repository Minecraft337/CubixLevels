name: CubixLevels
version: '1.0.0'
main: com.cubixlevels.CubixLevels
api-version: '1.21'
description: Level system for Cubix server
author: rizer001

softdepend:
  - PlaceholderAPI

commands:
  cubixlevel:
    description: Main CubixLevel command
    aliases: [cl, level]
    permission: cubixlevels.user

permissions:
  cubixlevels.user:
    default: true
    description: "Базовые команды: /cubixlevel, /cubixlevel daily, /cubixlevel stats"

  cubixlevels.reload:
    default: op
    description: "Перезагрузка конфига (/cubixlevel reload)"

  cubixlevels.admin:
    default: op
    description: "Доступ ко всем админ-командам"

  cubixlevels.admin.setlevel:
    default: op
    description: "Установить уровень игроку (/cubixlevel admin setlevel <player> <level>)"

  cubixlevels.admin.addxp:
    default: op
    description: "Добавить XP игроку (/cubixlevel admin addxp <player> <amount>)"

  cubixlevels.admin.removexp:
    default: op
    description: "Забрать XP у игрока (/cubixlevel admin removexp <player> <amount>)"

  cubixlevels.admin.reset:
    default: op
    description: "Сбросить прогресс игрока (/cubixlevel admin reset <player>)"

  cubixlevels.admin.info:
    default: op
    description: "Показать информацию о игроке (/cubixlevel admin info <player>)"